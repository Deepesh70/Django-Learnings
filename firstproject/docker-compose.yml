services:
  mysql-db:
    image: mysql:8.0
    container_name: django-mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: deep
      MYSQL_DATABASE: learning_django
      MYSQL_USER: django_user
      MYSQL_PASSWORD: user_deep
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: